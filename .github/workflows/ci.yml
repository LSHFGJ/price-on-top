name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android-verification:
    name: Android verification
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure verification scripts are executable
        run: chmod +x ./gradlew ./scripts/ci.sh

      - name: Run reproducible local CI script
        run: ./scripts/ci.sh

      - name: Upload CI evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: task-9-ci-local
          path: .sisyphus/evidence/task-9-ci-local.txt
          if-no-files-found: warn
